<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Base de Datos Dr Perez • Viewer</title>
  <style>
    :root{--bg:#f6f9ff;--card:#fff;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--accent:#1d4ed8;--ok:#16a34a;--warn:#f59e0b;--bad:#ef4444;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    *{box-sizing:border-box} body{margin:0;font-family:var(--sans);color:var(--ink);background:radial-gradient(900px 520px at 10% 0%,rgba(29,78,216,.12),transparent 60%),linear-gradient(180deg,var(--bg),#fff)}
    .wrap{max-width:1400px;margin:0 auto;padding:22px}.header,.panel,.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.header{display:flex;justify-content:space-between;gap:14px;padding:16px}.title{margin:0;font-size:22px;font-weight:900}.subtitle,.hint{color:var(--muted);font-size:13px;line-height:1.45}.nav{display:flex;gap:8px;margin-top:10px}.navbtn,.btn{border:1px solid var(--line);border-radius:999px;background:#fff;padding:9px 12px;font-weight:900;color:var(--muted);text-decoration:none;cursor:pointer}.navbtn.active{background:rgba(29,78,216,.08);border-color:rgba(29,78,216,.35);color:var(--accent)}.pill{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:10px 12px;font-weight:900;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--ok)}.dot.bad{background:var(--bad)}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}.stat{padding:12px;min-height:74px}.stat .k{font-size:12px;color:var(--muted)}.stat .v{font-size:18px;font-weight:900;margin-top:6px}.stat .s{font-size:12px;color:var(--muted);margin-top:4px}.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.panel{padding:14px}.panel-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 4px}select{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;min-width:150px}.table-wrap{overflow:auto;max-height:68vh;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:separate;border-spacing:0}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;font-size:13px;white-space:nowrap}th{position:sticky;top:0;background:#f8fafc;cursor:pointer}.pager{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:10px}@media(max-width:760px){.header{flex-direction:column}.tools>div,.tools select,.btn{width:100%}}
  </style>
</head>
<body><div class="wrap">
  <div class="header"><div><h1 class="title">EndoDB • Viewer</h1><div class="subtitle">Consulta solo bd_estudios: conteo VEDA/VCC y métricas mínimas de calidad de VCC.</div><div class="nav"><a class="navbtn" href="index.html">Carga</a><a class="navbtn active" href="viewer.html">Viewer</a><a class="navbtn" href="stats.html">Stats</a></div></div><div class="pill"><span id="dot" class="dot"></span><span id="status">Cargando…</span></div></div>
  <div class="stats" id="stats"></div>
  <div class="panel"><div class="panel-head"><div><h2 class="title" style="font-size:18px">Estudios registrados</h2><div class="hint" id="meta"></div></div><div class="tools"><div><label>Tipo de estudio</label><select id="fTipo"><option value="">Todos</option><option>VEDA</option><option>VCC</option></select></div><div><label>Sitio</label><select id="fLugar"><option value="">Todos los sitios</option><option value="SANTA_ISABEL">Clínica Santa Isabel</option><option value="PROVIDENCIA">Sanatorio de la Providencia</option><option value="HOSPITAL_CLINICAS">Hospital de Clínicas</option><option value="OTRO">Otro</option><option value="NO_INFORMADO">No informado</option></select></div><div><label>Llegó a ciego</label><select id="fCiego"><option value="">Todos</option><option>Sí</option><option>No</option><option>No aplica</option></select></div><div><label>Pólipos</label><select id="fPolipos"><option value="">Todos</option><option>Sí</option><option>No</option><option>No aplica</option></select></div><div><label>Boston adecuado</label><select id="fBoston"><option value="">Todos</option><option>Adecuado</option><option>Inadecuado</option><option>Sin dato</option><option>No aplica</option></select></div><button class="btn" id="refresh">↻ Recargar</button></div></div><div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><div class="pager"><button class="btn" id="prev">Anterior</button><span id="page">1/1</span><button class="btn" id="next">Siguiente</button></div></div>
</div><script>
const ENDPOINT='/api/directus/bd_estudios?fields=id,ingesta,exam_id,source_file_name,procedure_type,fecha,lugar_estudio.id,lugar_estudio.codigo,lugar_estudio.nombre,lugar_estudio.nombre_corto,indicacion,llego_a_ciego,llego_a_ileon,boston_total,boston_derecho,boston_transverso,boston_izquierdo,polipos,created_at&sort[]=-fecha&sort[]=-id&limit=-1';
const COLUMNS=['fecha','procedure_type','sitio','indicacion','llego_a_ciego','llego_a_ileon','boston_total','boston_derecho','boston_transverso','boston_izquierdo','boston_adecuado','polipos','source_file_name','exam_id'];
let state={rows:[],filters:{},page:1,sort:null,dir:'asc'}; const $=id=>document.getElementById(id), esc=v=>(v??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function unwrap(j){return Array.isArray(j)?j:Array.isArray(j?.data)?j.data:Array.isArray(j?.rows)?j.rows:Array.isArray(j?.items)?j.items:[]} async function get(url){const r=await fetch(url); const text=await r.text(); let json; try{json=text?JSON.parse(text):null}catch{json=text} if(!r.ok) throw new Error(`${r.status}`); return unwrap(json)}
function raw(v){return v&&typeof v==='object'?(v.id??v.value??null):v} function lugarNombre(r){const l=r.lugar_estudio; if(l&&typeof l==='object') return l.nombre_corto||l.nombre||'No informado'; return empty(l)?'No informado':String(l)} function lugarCodigo(r){const l=r.lugar_estudio; if(l&&typeof l==='object') return l.codigo||'NO_INFORMADO'; return empty(l)?'NO_INFORMADO':String(l)} function empty(v){return v===null||v===undefined||String(v).trim()===''} function typeOf(r){return String(raw(r.procedure_type)||'').trim().toUpperCase()} function isVcc(r){return typeOf(r)==='VCC'} function isVeda(r){return typeOf(r)==='VEDA'} function num(v){v=raw(v); return empty(v)?null:Number(v)}
function boolVal(v){v=raw(v); if(v===true||v===1) return true; if(v===false||v===0) return false; const s=String(v??'').trim().toLowerCase(); if(['sí','si','true','1','yes'].includes(s)) return true; if(['no','false','0'].includes(s)) return false; return null}
function boolText(v){const b=boolVal(v); return b===true?'Sí':b===false?'No':'Sin dato'} function ciego(r){return boolVal(r.llego_a_ileon)===true?true:boolVal(r.llego_a_ciego)} function metricBool(r,k){return isVeda(r)?'No aplica':isVcc(r)?boolText(k==='llego_a_ciego'?ciego(r):r[k]):'Sin dato'} function metricVal(r,k){return isVeda(r)?'No aplica':isVcc(r)?(empty(raw(r[k]))?'Sin dato':raw(r[k])):'Sin dato'}
function bostonStatus(r){if(isVeda(r)) return 'No aplica'; if(!isVcc(r)) return 'Sin dato'; const vals=['boston_total','boston_derecho','boston_transverso','boston_izquierdo'].map(k=>num(r[k])); if(vals.every(v=>v===null)) return 'Sin dato'; return vals[0]>=6&&vals[1]>=2&&vals[2]>=2&&vals[3]>=2?'Adecuado':'Inadecuado'}
function row(r){return {fecha:empty(raw(r.fecha))?'Sin dato':raw(r.fecha),procedure_type:typeOf(r)||'Sin dato',sitio:lugarNombre(r),sitio_codigo:lugarCodigo(r),indicacion:empty(raw(r.indicacion))?'Sin dato':raw(r.indicacion),llego_a_ciego:metricBool(r,'llego_a_ciego'),llego_a_ileon:metricBool(r,'llego_a_ileon'),boston_total:metricVal(r,'boston_total'),boston_derecho:metricVal(r,'boston_derecho'),boston_transverso:metricVal(r,'boston_transverso'),boston_izquierdo:metricVal(r,'boston_izquierdo'),boston_adecuado:bostonStatus(r),polipos:isVeda(r)?'No aplica':isVcc(r)?boolText(r.polipos):'Sin dato',source_file_name:empty(raw(r.source_file_name))?'Sin dato':raw(r.source_file_name),exam_id:empty(raw(r.exam_id))?'Sin dato':raw(r.exam_id)}}
function filtered(){let out=[...state.rows],f=state.filters; if(f.tipo)out=out.filter(r=>r.procedure_type===f.tipo); if(f.lugar)out=out.filter(r=>r.sitio_codigo===f.lugar); if(f.ciego)out=out.filter(r=>r.llego_a_ciego===f.ciego); if(f.polipos)out=out.filter(r=>r.polipos===f.polipos); if(f.boston)out=out.filter(r=>r.boston_adecuado===f.boston); if(state.sort){const k=state.sort,d=state.dir==='asc'?1:-1; out.sort((a,b)=>String(a[k]??'').localeCompare(String(b[k]??''),undefined,{numeric:true})*d)} return out}
function renderStats(rows){const vcc=rows.filter(r=>r.procedure_type==='VCC'),veda=rows.filter(r=>r.procedure_type==='VEDA'); const stats=[['Total estudios',rows.length,'bd_estudios'],['Total VEDA',veda.length,'procedimientos'],['Total VCC',vcc.length,'procedimientos'],['VCC ciego',vcc.filter(r=>r.llego_a_ciego==='Sí').length,'incluye íleon'],['VCC Boston adecuado',vcc.filter(r=>r.boston_adecuado==='Adecuado').length,'calidad mínima']]; $('stats').innerHTML=stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v">${s[1]}</div><div class="s">${s[2]}</div></div>`).join('')}
function render(){const rows=filtered(); if(state.page<1)state.page=1; const max=Math.max(1,Math.ceil(rows.length/25)); if(state.page>max)state.page=max; const pageRows=rows.slice((state.page-1)*25,state.page*25); $('thead').innerHTML='<tr>'+COLUMNS.map(c=>`<th data-c="${esc(c)}">${esc(c)}</th>`).join('')+'</tr>'; $('tbody').innerHTML=pageRows.map(r=>'<tr>'+COLUMNS.map(c=>`<td>${esc(r[c])}</td>`).join('')+'</tr>').join(''); $('meta').textContent=`${rows.length} filas filtradas de ${state.rows.length} estudios. VEDA+VCC aparece como dos filas si n8n creó dos registros.`; $('page').textContent=`${state.page}/${max}`; document.querySelectorAll('th').forEach(th=>th.onclick=()=>{const c=th.dataset.c; state.dir=state.sort===c&&state.dir==='asc'?'desc':'asc'; state.sort=c; render()}); renderStats(rows)}
async function loadAll(){ $('status').textContent='Cargando…'; $('dot').className='dot'; try{state.rows=(await get(ENDPOINT)).map(row); $('status').textContent='Cargado'; $('dot').className='dot ok'}catch(e){state.rows=[]; $('status').textContent='Error de carga'; $('dot').className='dot bad'} state.page=1; render()}
['fTipo','fLugar','fCiego','fPolipos','fBoston'].forEach(id=>$(id).oninput=()=>{state.filters={tipo:$('fTipo').value,lugar:$('fLugar').value,ciego:$('fCiego').value,polipos:$('fPolipos').value,boston:$('fBoston').value}; state.page=1; render()}); $('prev').onclick=()=>{state.page--;render()}; $('next').onclick=()=>{state.page++;render()}; $('refresh').onclick=loadAll; loadAll();
</script></body></html>
