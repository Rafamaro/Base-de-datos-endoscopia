<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Base de Datos Dr Perez • Viewer</title>
  <style>
    :root{--bg:#f6f9ff;--card:#fff;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--accent:#1d4ed8;--ok:#16a34a;--warn:#f59e0b;--bad:#ef4444;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    *{box-sizing:border-box} body{margin:0;font-family:var(--sans);color:var(--ink);background:radial-gradient(900px 520px at 10% 0%,rgba(29,78,216,.12),transparent 60%),linear-gradient(180deg,var(--bg),#fff)}
    .wrap{max-width:1400px;margin:0 auto;padding:22px}.header,.panel,.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.header{display:flex;justify-content:space-between;gap:14px;padding:16px}.title{margin:0;font-size:22px;font-weight:900}.subtitle,.hint{color:var(--muted);font-size:13px;line-height:1.45}.nav{display:flex;gap:8px;margin-top:10px}.navbtn,.tab,.btn{border:1px solid var(--line);border-radius:999px;background:#fff;padding:9px 12px;font-weight:900;color:var(--muted);text-decoration:none;cursor:pointer}.navbtn.active,.tab.active{background:rgba(29,78,216,.08);border-color:rgba(29,78,216,.35);color:var(--accent)}.pill{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:10px 12px;font-weight:900;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--ok)}.dot.bad{background:var(--bad)}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}.stat{padding:12px;min-height:74px}.stat .k{font-size:12px;color:var(--muted)}.stat .v{font-size:18px;font-weight:900;margin-top:6px}.stat .s{font-size:12px;color:var(--muted);margin-top:4px}.tabs,.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.panel{padding:14px}.panel-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 4px}input,select{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;min-width:150px}input{min-width:240px}.warning{border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.08);border-radius:14px;padding:10px;margin:10px 0;color:#92400e}.table-wrap{overflow:auto;max-height:65vh;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:separate;border-spacing:0}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;font-size:13px;white-space:nowrap}th{position:sticky;top:0;background:#f8fafc;cursor:pointer}.pager{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:10px}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:14px;padding:12px;overflow:auto}.dist{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:10px}.dist ul{margin:8px 0 0;padding-left:20px}
  </style>
</head>
<body><div class="wrap">
  <div class="header"><div><h1 class="title">EndoDB • Viewer</h1><div class="subtitle">Nueva estructura Directus vía endpoints relativos/proxy. No se usan tokens en el navegador.</div><div class="nav"><a class="navbtn" href="index.html">Carga</a><a class="navbtn active" href="viewer.html">Viewer</a><a class="navbtn" href="stats.html">Stats</a></div></div><div class="pill"><span id="dot" class="dot"></span><span id="status">Cargando…</span></div></div>
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div class="panel"><div class="panel-head"><h2 id="title">—</h2><div class="tools"><div><label>Búsqueda general</label><input id="q" placeholder="texto..."></div><div><label>Tipo</label><select id="fTipo"><option value="">Todos</option></select></div><div><label>Lugar</label><select id="fLugar"><option value="">Todos</option></select></div><div><label>Endoscopista</label><select id="fEndo"><option value="">Todos</option></select></div><div><label>Estado</label><select id="fEstado"><option value="">Todos</option></select></div><div><label>Mes/año</label><input id="fMes" type="month"></div><button class="btn" id="refresh">↻ Recargar</button></div></div><div id="sensitive"></div><div class="hint" id="meta"></div><div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><div class="pager"><button class="btn" id="prev">Anterior</button><span id="page">1/1</span><button class="btn" id="next">Siguiente</button></div><details><summary class="hint" style="cursor:pointer;font-weight:900;margin-top:10px">Debug JSON</summary><pre id="debug">{}</pre></details></div>
  <div class="dist" id="dist"></div>
</div><script>
const ENDPOINTS={estudios:'/api/directus/bd_estudios',vcc:'/api/directus/bd_vcc_calidad',identificaciones:'/api/directus/bd_identificaciones',ingestas:'/api/directus/bd_ingestas',revisiones:'/api/directus/bd_revisiones',endoscopistas:'/api/directus/bd_endoscopistas',lugares:'/api/directus/bd_lugares'};
const TABS=[{id:'estudios',label:'Estudios',cols:['id','identificacion','fecha_estudio','hora_salida','tipo_estudio','endoscopista','lugar_estudio','terapeutica','polipos','estado_procesamiento','source_file_name','source_file_kind']},{id:'vcc',label:'VCC Calidad',cols:['estudio','llego_a_ciego','boston_total','boston_derecho','boston_transverso','boston_izquierdo','preparacion_adecuada','adenoma']},{id:'identificaciones',label:'Identificaciones',sensitive:true,cols:['id','patient_code','nombre','apellido','documento','fecha_nacimiento']},{id:'ingestas',label:'Ingestas',cols:['id','created_at','source_file_name','source_file_kind','status','warnings']},{id:'revisiones',label:'Revisiones',cols:['id','estudio','estado','motivo','created_at']}];
let state={active:'estudios',data:{},errors:{},q:'',filters:{},page:1,sort:null,dir:'asc'}; const $=id=>document.getElementById(id), esc=v=>(v??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function unwrap(j){return Array.isArray(j)?j:Array.isArray(j?.data)?j.data:Array.isArray(j?.rows)?j.rows:Array.isArray(j?.items)?j.items:[]} async function get(url){const r=await fetch(url); const text=await r.text(); let json; try{json=text?JSON.parse(text):null}catch{json=text} if(!r.ok) throw Object.assign(new Error(`${r.status}`),{status:r.status,body:json}); return unwrap(json)}
function val(r,k){let v=r?.[k]; if(v&&typeof v==='object') return v.nombre||v.name||v.codigo||v.id||JSON.stringify(v); return v} function truth(v){return ['si','sí','true','1','yes'].includes(String(v??'').trim().toLowerCase())} function normType(r){return String(val(r,'tipo_estudio')||val(r,'procedure_type')||'').toUpperCase()} function month(v){return String(v||'').slice(0,7)}
function filtered(rows){let out=[...rows], f=state.filters, q=state.q.toLowerCase(); if(q) out=out.filter(r=>Object.values(r).some(v=>String(typeof v==='object'?JSON.stringify(v):v).toLowerCase().includes(q))); if(f.tipo) out=out.filter(r=>normType(r)===f.tipo); if(f.lugar) out=out.filter(r=>String(val(r,'lugar_estudio'))===f.lugar); if(f.endo) out=out.filter(r=>String(val(r,'endoscopista'))===f.endo); if(f.estado) out=out.filter(r=>String(val(r,'estado_procesamiento')||val(r,'status'))===f.estado); if(f.mes) out=out.filter(r=>month(val(r,'fecha_estudio')||val(r,'created_at'))===f.mes); if(state.sort){let k=state.sort,d=state.dir==='asc'?1:-1; out.sort((a,b)=>String(val(a,k)??'').localeCompare(String(val(b,k)??''),undefined,{numeric:true})*d)} return out}
function options(id,values){const el=$(id), cur=el.value; el.innerHTML='<option value="">Todos</option>'+[...new Set(values.filter(Boolean).map(String))].sort().map(v=>`<option>${esc(v)}</option>`).join(''); el.value=cur}
function renderStats(){const est=filtered(state.data.estudios||[]), vcc=state.data.vcc||[], byId=new Map(vcc.map(r=>[String(val(r,'estudio')||val(r,'estudio_id')),r])); const vccEst=est.filter(r=>normType(r)==='VCC'), veda=est.filter(r=>normType(r)==='VEDA'); const ciego=vccEst.filter(r=>truth(val(byId.get(String(r.id))||{},'llego_a_ciego'))).length; const prep=vccEst.filter(r=>truth(val(byId.get(String(r.id))||{},'preparacion_adecuada'))).length; const stats=[['Total estudios',est.length,'Filtrados'],['VCC',vccEst.length,'Clasificación del flujo'],['VEDA',veda.length,'Clasificación del flujo'],['Terapéuticas',est.filter(r=>truth(val(r,'terapeutica'))).length,'bd_estudios'],['Pólipos',est.filter(r=>truth(val(r,'polipos'))).length,'bd_estudios'],['VCC llegada a ciego',`${ciego}/${vccEst.length}`,'bd_vcc_calidad'],['Preparación adecuada',`${prep}/${vccEst.length}`,'bd_vcc_calidad'],['Pendientes/revisión',est.filter(r=>/pend|revision|revisión/i.test(String(val(r,'estado_procesamiento')||''))).length,'estado_procesamiento']]; $('stats').innerHTML=stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v">${s[1]}</div><div class="s">${s[2]}</div></div>`).join(''); const dist=(key,title)=>{const m={}; est.forEach(r=>{const x=String(val(r,key)||'Sin dato');m[x]=(m[x]||0)+1}); return `<div class="panel"><b>${title}</b><ul>${Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v])=>`<li>${esc(k)}: ${v}</li>`).join('')}</ul></div>`}; $('dist').innerHTML=dist('lugar_estudio','Distribución por lugar')+dist('endoscopista','Distribución por endoscopista')}
function render(){const tab=TABS.find(t=>t.id===state.active), rows=filtered(state.data[tab.id]||[]); $('title').textContent=tab.label; $('sensitive').innerHTML=tab.sensitive?'<div class="warning"><b>Datos sensibles.</b> No mostrar si el backend responde 403. No exponer sin control de acceso.</div>':''; const cols=[...new Set([...tab.cols,...Object.keys(rows[0]||{})])]; if(state.page<1)state.page=1; const max=Math.max(1,Math.ceil(rows.length/25)); if(state.page>max)state.page=max; const pageRows=rows.slice((state.page-1)*25,state.page*25); $('thead').innerHTML='<tr>'+cols.map(c=>`<th data-c="${esc(c)}">${esc(c)}</th>`).join('')+'</tr>'; $('tbody').innerHTML=pageRows.map(r=>'<tr>'+cols.map(c=>`<td>${esc(val(r,c))}</td>`).join('')+'</tr>').join(''); $('meta').textContent=`${rows.length} filas • hora_salida: ${rows.filter(r=>val(r,'hora_salida')).length} con hora / ${rows.length} total`; $('page').textContent=`${state.page}/${max}`; $('debug').textContent=JSON.stringify({endpoint:ENDPOINTS[tab.id],error:state.errors[tab.id]||null,sample:(state.data[tab.id]||[])[0]||null},null,2); document.querySelectorAll('th').forEach(th=>th.onclick=()=>{const c=th.dataset.c; state.dir=state.sort===c&&state.dir==='asc'?'desc':'asc'; state.sort=c; render()}); renderStats()}
function renderTabs(){ $('tabs').innerHTML=TABS.map(t=>`<button class="tab ${t.id===state.active?'active':''}" data-id="${t.id}">${t.label}</button>`).join('')+'<span class="hint">Colecciones soportadas: bd_identificaciones, bd_estudios, bd_vcc_calidad, bd_endoscopistas, bd_lugares, bd_ingestas, bd_ingesta_items, bd_revisiones.</span>'; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.active=b.dataset.id; state.page=1; renderTabs(); render()})}
async function loadAll(){ $('status').textContent='Cargando…'; $('dot').className='dot'; state.errors={}; for(const [id,url] of Object.entries(ENDPOINTS)){try{state.data[id]=await get(url)}catch(e){state.data[id]=[]; state.errors[id]={status:e.status||'error',body:e.body||String(e)}}} const est=state.data.estudios||[]; options('fTipo',est.map(normType)); options('fLugar',est.map(r=>val(r,'lugar_estudio'))); options('fEndo',est.map(r=>val(r,'endoscopista'))); options('fEstado',est.map(r=>val(r,'estado_procesamiento')||val(r,'status'))); $('status').textContent=Object.keys(state.errors).length?'Carga parcial':'Cargado'; $('dot').className='dot '+(Object.keys(state.errors).length?'bad':'ok'); render()}
['q','fTipo','fLugar','fEndo','fEstado','fMes'].forEach(id=>$(id).oninput=e=>{state.q=$('q').value; state.filters={tipo:$('fTipo').value,lugar:$('fLugar').value,endo:$('fEndo').value,estado:$('fEstado').value,mes:$('fMes').value}; state.page=1; render()}); $('prev').onclick=()=>{state.page--;render()}; $('next').onclick=()=>{state.page++;render()}; $('refresh').onclick=loadAll; renderTabs(); loadAll();
</script></body></html>
