<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Base de Datos Dr Perez • Viewer clínico</title>
  <style>
    :root{--bg:#f6f9ff;--card:#fff;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--accent:#1d4ed8;--ok:#16a34a;--warn:#f59e0b;--bad:#ef4444;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    *{box-sizing:border-box} body{margin:0;font-family:var(--sans);color:var(--ink);background:radial-gradient(900px 520px at 10% 0%,rgba(29,78,216,.12),transparent 60%),linear-gradient(180deg,var(--bg),#fff)}
    .wrap{max-width:1400px;margin:0 auto;padding:22px}.header,.panel,.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.header{display:flex;justify-content:space-between;gap:14px;padding:16px}.title{margin:0;font-size:22px;font-weight:900}.subtitle,.hint{color:var(--muted);font-size:13px;line-height:1.45}.nav{display:flex;gap:8px;margin-top:10px}.navbtn,.btn{border:1px solid var(--line);border-radius:999px;background:#fff;padding:9px 12px;font-weight:900;color:var(--muted);text-decoration:none;cursor:pointer}.navbtn.active{background:rgba(29,78,216,.08);border-color:rgba(29,78,216,.35);color:var(--accent)}.pill{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:10px 12px;font-weight:900;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--ok)}.dot.bad{background:var(--bad)}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}.stat{padding:12px;min-height:74px}.stat .k{font-size:12px;color:var(--muted)}.stat .v{font-size:18px;font-weight:900;margin-top:6px}.stat .s{font-size:12px;color:var(--muted);margin-top:4px}.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.panel{padding:14px}.panel-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 4px}select{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;min-width:150px}.table-wrap{overflow:auto;max-height:68vh;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:separate;border-spacing:0}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;font-size:13px;white-space:nowrap}th{position:sticky;top:0;background:#f8fafc;cursor:pointer}.pager{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:10px}
  </style>
</head>
<body><div class="wrap">
  <div class="header"><div><h1 class="title">EndoDB • Viewer clínico</h1><div class="subtitle">Tabla plana de variables clínicas desde bd_estudios y bd_vcc_calidad. No solicita ni muestra datos sensibles ni campos técnicos.</div><div class="nav"><a class="navbtn" href="index.html">Carga</a><a class="navbtn active" href="viewer.html">Viewer</a><a class="navbtn" href="stats.html">Stats</a></div></div><div class="pill"><span id="dot" class="dot"></span><span id="status">Cargando…</span></div></div>
  <div class="stats" id="stats"></div>
  <div class="panel"><div class="panel-head"><div><h2 class="title" style="font-size:18px">Variables clínicas documentadas</h2><div class="hint" id="meta"></div></div><div class="tools"><div><label>Tipo de estudio</label><select id="fTipo"><option value="">Todos</option><option>VEDA</option><option>VCC</option></select></div><div><label>Llegó a ciego</label><select id="fCiego"><option value="">Todos</option><option>Sí</option><option>No</option><option>Sin dato</option></select></div><div><label>Pólipos</label><select id="fPolipos"><option value="">Todos</option><option>Sí</option><option>No</option></select></div><div><label>Terapéutica</label><select id="fTerapeutica"><option value="">Todos</option><option>Sí</option><option>No</option></select></div><div><label>Adenoma</label><select id="fAdenoma"><option value="">Todos</option><option>Sí</option><option>No</option><option>No aplica</option><option>Sin dato</option></select></div><button class="btn" id="refresh">↻ Recargar</button></div></div><div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><div class="pager"><button class="btn" id="prev">Anterior</button><span id="page">1/1</span><button class="btn" id="next">Siguiente</button></div></div>
</div><script>
const ENDPOINTS={
  estudios:'/api/directus/bd_estudios?fields=id,exam_id,procedure_type,polipos,terapeutica&limit=-1',
  vcc:'/api/directus/bd_vcc_calidad?fields=id,estudio,llego_a_ciego,boston_total,boston_derecho,boston_transverso,boston_izquierdo,adenoma,adenoma_detectado,tiempo_retirada_informado,tiempo_retirada_minutos,tiempo_retirada_texto&limit=-1'
};
const COLUMNS=['exam_id','procedure_type','llego_a_ciego','polipos','terapeutica','boston_total','boston_derecho','boston_transverso','boston_izquierdo','tiempo_retirada_informado','tiempo_retirada_minutos','tiempo_retirada_texto','adenoma','adenoma_detectado'];
let state={rows:[],errors:{},filters:{},page:1,sort:null,dir:'asc'}; const $=id=>document.getElementById(id), esc=v=>(v??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function unwrap(j){return Array.isArray(j)?j:Array.isArray(j?.data)?j.data:Array.isArray(j?.rows)?j.rows:Array.isArray(j?.items)?j.items:[]} async function get(url){const r=await fetch(url); const text=await r.text(); let json; try{json=text?JSON.parse(text):null}catch{json=text} if(!r.ok) throw Object.assign(new Error(`${r.status}`),{status:r.status,body:json}); return unwrap(json)}
function raw(v){return v&&typeof v==='object'?(v.id??v.value??null):v} function tipo(estudio){return String(raw(estudio.procedure_type)||'').trim().toUpperCase()} function isVeda(t){return t==='VEDA'} function isVcc(t){return t==='VCC'} function empty(v){return v===null||v===undefined||String(v).trim()===''}
function boolText(v,missing='Sin dato'){v=raw(v); if(v===true) return 'Sí'; if(v===false) return 'No'; const s=String(v??'').trim().toLowerCase(); if(['sí','si','true','1','yes'].includes(s)) return 'Sí'; if(['no','false','0'].includes(s)) return 'No'; return missing}
function clinicalValue(t,calidad,key){return isVeda(t)?'No aplica':isVcc(t)?(empty(raw(calidad?.[key]))?'Sin dato':raw(calidad[key])):'Sin dato'}
function clinicalBool(t,calidad,key){return isVeda(t)?'No aplica':isVcc(t)?boolText(calidad?.[key]):'Sin dato'}
function withdrawalBool(t,calidad){return isVeda(t)?'No aplica':isVcc(t)?boolText(calidad?.tiempo_retirada_informado,'No'):'Sin dato'}
function withdrawalValue(t,calidad,key){return isVeda(t)?'No aplica':isVcc(t)?(empty(raw(calidad?.[key]))?'Sin dato':raw(calidad[key])):'Sin dato'}
function buildRows(estudios,vccCalidad){const calidadPorEstudio=new Map(vccCalidad.map(row=>[Number(raw(row.estudio)),row])); return estudios.map(estudio=>{const t=tipo(estudio), calidad=calidadPorEstudio.get(Number(estudio.id))||null; return {exam_id:empty(raw(estudio.exam_id))?'Sin dato':raw(estudio.exam_id),procedure_type:t||'Sin dato',llego_a_ciego:clinicalBool(t,calidad,'llego_a_ciego'),polipos:boolText(estudio.polipos),terapeutica:boolText(estudio.terapeutica),boston_total:clinicalValue(t,calidad,'boston_total'),boston_derecho:clinicalValue(t,calidad,'boston_derecho'),boston_transverso:clinicalValue(t,calidad,'boston_transverso'),boston_izquierdo:clinicalValue(t,calidad,'boston_izquierdo'),tiempo_retirada_informado:withdrawalBool(t,calidad),tiempo_retirada_minutos:withdrawalValue(t,calidad,'tiempo_retirada_minutos'),tiempo_retirada_texto:withdrawalValue(t,calidad,'tiempo_retirada_texto'),adenoma:clinicalBool(t,calidad,'adenoma'),adenoma_detectado:clinicalBool(t,calidad,'adenoma_detectado')};});}
function filtered(){let out=[...state.rows], f=state.filters; if(f.tipo) out=out.filter(r=>r.procedure_type===f.tipo); if(f.ciego) out=out.filter(r=>r.llego_a_ciego===f.ciego); if(f.polipos) out=out.filter(r=>r.polipos===f.polipos); if(f.terapeutica) out=out.filter(r=>r.terapeutica===f.terapeutica); if(f.adenoma) out=out.filter(r=>r.adenoma===f.adenoma); if(state.sort){const k=state.sort,d=state.dir==='asc'?1:-1; out.sort((a,b)=>String(a[k]??'').localeCompare(String(b[k]??''),undefined,{numeric:true})*d)} return out}
function renderStats(rows){const vcc=rows.filter(r=>r.procedure_type==='VCC'), veda=rows.filter(r=>r.procedure_type==='VEDA'); const stats=[['Total estudios',rows.length,'bd_estudios'],['VCC',vcc.length,'Con calidad cruzada'],['VEDA',veda.length,'Variables VCC: No aplica'],['Pólipos',rows.filter(r=>r.polipos==='Sí').length,'bd_estudios'],['Terapéutica',rows.filter(r=>r.terapeutica==='Sí').length,'bd_estudios'],['Adenoma VCC',vcc.filter(r=>r.adenoma==='Sí').length,'bd_vcc_calidad'],['Tiempo retirada informado',vcc.filter(r=>r.tiempo_retirada_informado==='Sí').length,'bd_vcc_calidad']]; $('stats').innerHTML=stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v">${s[1]}</div><div class="s">${s[2]}</div></div>`).join('')}
function render(){const rows=filtered(); if(state.page<1)state.page=1; const max=Math.max(1,Math.ceil(rows.length/25)); if(state.page>max)state.page=max; const pageRows=rows.slice((state.page-1)*25,state.page*25); $('thead').innerHTML='<tr>'+COLUMNS.map(c=>`<th data-c="${esc(c)}">${esc(c)}</th>`).join('')+'</tr>'; $('tbody').innerHTML=pageRows.map(r=>'<tr>'+COLUMNS.map(c=>`<td>${esc(r[c])}</td>`).join('')+'</tr>').join(''); $('meta').textContent=`${rows.length} filas filtradas de ${state.rows.length} estudios. Solo se muestran las columnas clínicas definidas.`; $('page').textContent=`${state.page}/${max}`; document.querySelectorAll('th').forEach(th=>th.onclick=()=>{const c=th.dataset.c; state.dir=state.sort===c&&state.dir==='asc'?'desc':'asc'; state.sort=c; render()}); renderStats(rows)}
async function loadAll(){ $('status').textContent='Cargando…'; $('dot').className='dot'; state.errors={}; try{const [estudios,vccCalidad]=await Promise.all([get(ENDPOINTS.estudios),get(ENDPOINTS.vcc)]); state.rows=buildRows(estudios,vccCalidad); $('status').textContent='Cargado'; $('dot').className='dot ok'}catch(e){state.rows=[]; state.errors.load={status:e.status||'error'}; $('status').textContent='Error de carga'; $('dot').className='dot bad'} state.page=1; render()}
['fTipo','fCiego','fPolipos','fTerapeutica','fAdenoma'].forEach(id=>$(id).oninput=()=>{state.filters={tipo:$('fTipo').value,ciego:$('fCiego').value,polipos:$('fPolipos').value,terapeutica:$('fTerapeutica').value,adenoma:$('fAdenoma').value}; state.page=1; render()}); $('prev').onclick=()=>{state.page--;render()}; $('next').onclick=()=>{state.page++;render()}; $('refresh').onclick=loadAll; loadAll();
</script></body></html>
